name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: TypeScript typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  python:
    name: altmonitor syntax check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile (syntax check, no network)
        run: python -m compileall -q altmonitor
      - name: Unit tests (stdlib only, no network / no deps)
        working-directory: altmonitor
        run: python -m unittest test_env_io test_ssh_util test_tg_probe test_links
