name: Publish to npm

# Publishes the package to npm. Triggers:
#   - manually from the Actions tab ("Run workflow"), or
#   - automatically when a GitHub Release is published.
#
# Auth — pick ONE (the workflow supports both):
#   A) Trusted Publishing (recommended, no secret): on npmjs.com → the package →
#      Settings → Trusted Publisher, add this repo + workflow `publish.yml`.
#      Then publishing uses OIDC — no token to create, rotate, or leak.
#   B) Token: create an npm automation/granular token with "Bypass 2FA" + write,
#      add it as the repo secret NPM_TOKEN. Used as a fallback when set.
#
# Either way the publish is signed with provenance (the "Published via GitHub
# Actions" badge on npm), which needs id-token: write below.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # OIDC: npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # npm >= 11.5 is required for OIDC trusted publishing.
      - run: npm install -g npm@latest
      # Skip cleanly if this version is already on npm (e.g. a Release created for
      # an already-published version) instead of failing the run on a duplicate.
      - id: published
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "binance-smart-money-oi-monitor@$V" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$V is already on npm — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
